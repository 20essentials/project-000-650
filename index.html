<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3d Book</title>
    <meta name="google" content="notranslate" />
    <link rel="shortcut icon" href="assets/favicon.webp" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="book">
      <img
        draggable="false"
        class="image front"
        src="assets/front.avif"
        alt="front"
      />
      <img
        draggable="false"
        class="image side"
        src="assets/side.avif"
        alt="side"
      />
      <img
        draggable="false"
        class="image back"
        src="assets/back.avif"
        alt="back"
      />
    </section>
  </body>
</html>
